repositories {
  mavenLocal()
  mavenCentral()
  maven {
    url 'https://maven.google.com/'
    name 'Google'
  }
  maven { url "https://repo1.maven.org/maven2/" }
  google()
}

android {
  namespace = "org.nativescript.nssolidtanstackrouter"
  compileSdkVersion 36
  buildToolsVersion "36"
  // ndkVersion ""

  defaultConfig {
    minSdkVersion 24
    targetSdkVersion 36

    // Version Information
    versionCode 1
    versionName "1.0.0"
    
    generatedDensities = []
  }

  aaptOptions {
    additionalParameters "--no-version-vectors"
  }
}
